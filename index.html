<title>PassionStocks Roadmap</title>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
input,select,textarea,button{font-family:inherit}

#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3}
.gate-box{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:2rem;width:340px}
.gate-logo{font-family:monospace;font-size:20px;font-weight:500;margin-bottom:1.5rem}
.gate-sub{font-size:13px;color:#666;margin-bottom:1.5rem}
.pw-wrap{position:relative;margin-bottom:1rem}
.pw-wrap input{width:100%;padding:8px 36px 8px 12px;border:0.5px solid rgba(0,0,0,0.25);border-radius:8px;font-size:14px;background:#f5f5f3}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:14px;padding:2px}
.gate-btn{width:100%;padding:9px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.gate-err{font-size:13px;color:#a32d2d;margin-top:8px;display:none}

#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:0 1rem;height:48px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:monospace;font-size:15px;font-weight:500;margin-right:4px}
.topbar-badge{font-size:11px;background:#f5f5f3;border:0.5px solid rgba(0,0,0,0.1);border-radius:20px;padding:2px 8px;color:#888}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{padding:5px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:none;font-size:12px;cursor:pointer;color:#1a1a1a}
.tb-btn:hover{background:#f5f5f3}
.search-box{padding:5px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#f5f5f3;font-size:12px;width:180px}

.main{display:flex;flex:1;overflow:auto}
.sidebar{width:280px;min-width:280px;border-right:0.5px solid rgba(0,0,0,0.1);background:#fff;overflow-y:auto;padding:8px 0}
.content{flex:1;overflow-y:auto;padding:1.5rem}

.tree-item{display:flex;align-items:center;gap:4px;padding:4px 8px 4px 0;cursor:pointer;user-select:none;border-radius:4px;position:relative}
.tree-item:hover{background:#f5f5f3}
.tree-item.active{background:#f5f5f3}
.tree-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa;flex-shrink:0}
.tree-label{font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-count{font-size:10px;padding:1px 5px;border-radius:10px;background:#7F77DD;color:#fff;min-width:16px;text-align:center}
.tree-count.done{background:#3B6D11;color:#fff}
.tree-add{font-size:11px;color:#aaa;padding:1px 6px;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;display:none;background:none;cursor:pointer}
.tree-item:hover .tree-add{display:block}
.tree-children{display:none}
.tree-children.open{display:block}

.col-header{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding:4px 0}
.col-wrap{display:flex;gap:12px;margin-bottom:1.5rem}
.col{flex:1;min-width:0}
.col-cards{min-height:60px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:12px;margin-bottom:8px}
.card-title{font-size:13px;font-weight:500;margin-bottom:4px}
.card-desc{font-size:12px;color:#666;margin-bottom:8px;line-height:1.5}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:8px}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.pri-high{background:#FCEBEB;color:#A32D2D}
.pri-med{background:#FAEEDA;color:#854F0B}
.pri-low{background:#EAF3DE;color:#3B6D11}
.badge-roadmap{background:#EEEDFE;color:#534AB7}
.badge-assignee{background:#f5f5f3;color:#666;border:0.5px solid rgba(0,0,0,0.12)}
.card-actions{display:flex;gap:4px;flex-wrap:wrap}
.ca-btn{font-size:11px;padding:3px 8px;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;background:none;cursor:pointer}
.ca-btn:hover{background:#f5f5f3}
.ca-btn.done-btn{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}

.section-title{font-size:18px;font-weight:500;margin-bottom:4px}
.section-path{font-size:12px;color:#888;margin-bottom:1.5rem}

.ver-group{margin-bottom:1.5rem}
.ver-group-title{font-size:12px;color:#888;font-weight:500;margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid rgba(0,0,0,0.1)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.open{display:flex}
.modal{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:13px;background:#f5f5f3}
.form-row textarea{min-height:72px;resize:vertical}
.form-check{display:flex;align-items:center;gap:8px;font-size:13px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}
.btn-primary{padding:7px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.btn-secondary{padding:7px 16px;background:none;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:13px;cursor:pointer}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.empty{font-size:12px;color:#aaa;padding:12px 0}
.ver-active-badge{font-size:10px;background:#EAF3DE;color:#3B6D11;padding:2px 7px;border-radius:10px;margin-left:6px}

.color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:4px}
.next-ver-badge{font-size:11px;background:#f5f5f3;border:0.5px solid rgba(0,0,0,0.15);border-radius:20px;padding:3px 10px;color:#534AB7;cursor:pointer;font-weight:500;font-family:inherit}

.ver-next-badge{font-size:10px;background:#EEEDFE;color:#534AB7;padding:2px 7px;border-radius:10px}
.progress-bar-wrap{background:#f0f0ee;border-radius:8px;height:6px;margin:6px 0 1.25rem}

.feed-role-title{font-size:12px;font-weight:500;color:#888;margin:1rem 0 4px;display:flex;align-items:center;gap:6px}

.feed-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">PassionStocks</div>
    <div class="gate-sub">Product Versions & Roadmap— team access</div>
    <div class="pw-wrap">
      <input type="password" id="pw-input" placeholder="Enter password" />
      <button class="pw-toggle" onclick="togglePw()">show</button>
    </div>
    <div class="form-check" style="margin-bottom:10px;font-size:13px;color:#555">
      <input type="checkbox" id="remember-check" checked style="margin-right:6px" />
      <label for="remember-check">Remember this device</label>
    </div>
    <button class="gate-btn" onclick="tryLogin()">Enter</button>
    <div class="gate-err" id="gate-err">Incorrect password</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <span class="topbar-logo">PassionStocks</span>
    <span class="topbar-badge" id="upd-badge">syncing...</span>
    <input class="search-box" id="search-inp" placeholder="Search items..." oninput="doSearch(this.value)" />
    <button class="next-ver-badge" id="next-ver-btn" onclick="openNextVerFeed()" style="display:none"></button>
    <div class="topbar-right">
      <button class="tb-btn" onclick="expandAll()">expand all</button>
      <button class="tb-btn" onclick="collapseAll()">collapse all</button>
      <button class="tb-btn" onclick="logout()">lock</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <h2 id="modal-title">Add item</h2>
    <div class="form-row"><label>Title</label><input id="f-title" type="text" /></div>
    <div class="form-row"><label>Description</label><textarea id="f-desc"></textarea></div>
    <div class="form-row"><label>Section</label><select id="f-section"></select></div>
    <div class="form-row"><label>Column</label><select id="f-col"></select></div>
    <div class="form-row"><label>Priority</label>
      <select id="f-pri"><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option></select>
    </div>
    <div class="form-row"><label>Assignee</label><input id="f-assignee" type="text" placeholder="Name or initials" /></div>
    <div class="form-row"><label>Target date</label><input id="f-date" type="date" /></div>
    <div class="form-row"><label>Target version</label><select id="f-targetver"></select></div>
    <div class="form-row"><label class="form-check"><input type="checkbox" id="f-roadmap" /> <span>Flag as roadmap / planned</span></label></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="ver-modal-overlay">
  <div class="modal">
    <h2>New version</h2>
    <div class="form-row"><label>Version name</label><input id="ver-name-inp" type="text" placeholder="e.g. Beta 2, V1.0, Alpha" /></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeVerModal()">Cancel</button>
      <button class="btn-primary" onclick="saveVersion()">Create & set active</button>
    </div>
  </div>
</div>


<div class="modal-overlay" id="rn-modal-overlay">
  <div class="modal" style="width:600px">
    <h2 id="rn-modal-title">Release Notes</h2>
    <textarea id="rn-output" style="width:100%;min-height:320px;font-family:monospace;font-size:12px;padding:10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#f5f5f3;resize:vertical;line-height:1.6"></textarea>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeRnModal()">Close</button>
      <button class="btn-primary" onclick="copyReleaseNotes()">Copy to clipboard</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const COL_TYPES = {
  'standard':['To Do','In Progress','Done'],
  'tier':['Tier 1','Tier 2','Tier 3'],
  'buyer-sub':['Shoutout wall recognition','Pay-as-you-go credits','Buyer tools'],
  'notif':['In-app','Push','Email','SMS'],
  'content':['Social Media','FAQ','Announcement','Done'],
  'simple':['Not Done','Done'],
};

function getColumns(colType){return COL_TYPES[colType]||COL_TYPES['standard']}

function getAllLeaves(tree,path){
  let out=[];
  for(let n of tree){
    let p=[...path,n.label];
    if(n.leaf){out.push({id:n.id,label:n.label,path:p,colType:n.colType})}
    if(n.children){out=out.concat(getAllLeaves(n.children,p))}
  }
  return out;
}
let ALL_LEAVES=getAllLeaves(TREE,[]);

function getPathString(nodeId){
  let leaf=ALL_LEAVES.find(l=>l.id===nodeId);
  return leaf?leaf.path.join(' › '):'';
}

function findNode(tree,id){
  for(let n of tree){
    if(n.id===id)return n;
    if(n.children){let f=findNode(n.children,id);if(f)return f;}
  }
  return null;
}

function getNodeRole(id){
  function search(tree,id,role){
    for(let n of tree){
      let r=n.role||role;
      if(n.id===id)return r;
      if(n.children){let f=search(n.children,id,r);if(f!==undefined)return f;}
    }
    return undefined;
  }
  return search(TREE,id,null);
}

function countItems(nodeId){
  let leaf=ALL_LEAVES.find(l=>l.id===nodeId);
  if(leaf)return items.filter(i=>i.section===nodeId).length;
  let children=getChildLeaves(nodeId);
  return items.filter(i=>children.includes(i.section)).length;
}

function countDone(nodeId){
  let leaf=ALL_LEAVES.find(l=>l.id===nodeId);
  if(leaf)return items.filter(i=>i.section===nodeId&&i.col==='Done').length;
  let children=getChildLeaves(nodeId);
  return items.filter(i=>children.includes(i.section)&&i.col==='Done').length;
}

function getChildLeaves(nodeId){
  let node=findNode(TREE,nodeId);
  if(!node)return[];
  if(node.leaf)return[nodeId];
  function collect(n){let o=[];if(n.leaf)return[n.id];if(n.children){for(let c of n.children)o=o.concat(collect(c));}return o;}
  return collect(node);
}

const localStore = {
  data: {},
  get(key){ return this.data[key]?{value:this.data[key]}:null; },
  set(key,val){ this.data[key]=val; try{localStorage.setItem('ps_'+key,val);}catch(e){} return {key,value:val}; },
  delete(key){ delete this.data[key]; try{localStorage.removeItem('ps_'+key);}catch(e){}; return {deleted:true}; },
  list(prefix){ return {keys:Object.keys(this.data).filter(k=>!prefix||k.startsWith(prefix))}; },
  load(){
    try{
      for(let k of ['ps-items','ps-versions','ps-activeVer','ps-nextVer','ps-open','ps-upd']){
        let v=localStorage.getItem('ps_'+k);
        if(v)this.data[k]=v;
      }
    }catch(e){}
  }
};

};

function togglePw(){
  let inp=document.getElementById('pw-input');
  let btn=document.querySelector('.pw-toggle');
  if(inp.type==='password'){inp.type='text';btn.textContent='hide';}
  else{inp.type='password';btn.textContent='show';}
}

function tryLogin(){
  let v=document.getElementById('pw-input').value;
  if(v===PASS){
    authed=true;
    if(document.getElementById('remember-check').checked){
      try{localStorage.setItem('ps-remember','true');}catch(e){}
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='flex';
    initApp();
  } else {
    document.getElementById('gate-err').style.display='block';
  }
}

document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
function logout(){
  authed=false;
  try{localStorage.removeItem('ps-remember');}catch(e){}
  document.getElementById('gate').style.display='flex';
  document.getElementById('app').style.display='none';
}

    if(!migR||!migR.value){
      const MIGR_ROOTS=['product','backoffice','notifications','backend'];
      function migrTop(sectionId){
        function s(nodes,id,top){for(let n of nodes){let t=top||n.id;if(n.id===id)return t;if(n.children){let f=s(n.children,id,t);if(f)return f;}}return null;}
        return s(TREE,sectionId,null);
      }
      let betaVer=versions.find(v=>v.id==='beta')||versions[0];
      let betaId=betaVer?betaVer.id:'beta';
      let migrCount=0;
      for(let item of items){
        if(item.targetVersion)continue;
        let top=migrTop(item.section);
        if(top&&MIGR_ROOTS.includes(top)){item.targetVersion=betaId;migrCount++;}
      }
      if(migrCount>0)await saveData();
      await storage.set('ps-migrated-targetver','1',true);
      console.log('[migration] targetVersion backfill: '+migrCount+' items updated, betaId='+betaId);

async function loadData(){
  try{let r=await storage.get('ps-items');items=r?JSON.parse(r.value):[];}catch(e){items=[];}
  try{let r=await storage.get('ps-versions');versions=r?JSON.parse(r.value):[{id:'beta',name:'Beta',created:Date.now()}];}catch(e){versions=[{id:'beta',name:'Beta',created:Date.now()}];}
  try{let r=await storage.get('ps-activeVer');activeVerId=r?r.value:'beta';}catch(e){activeVerId='beta';}
  try{let r=await storage.get('ps-nextVer');nextVerId=r&&r.value?r.value:null;}catch(e){nextVerId=null;}
  try{let r=await storage.get('ps-open');openNodes=r?JSON.parse(r.value):{};}catch(e){openNodes={};}
  try{let r=await storage.get('ps-upd');lastUpd=r?r.value:null;updateUpdBadge();}catch(e){}
  updateNextVerBadge();
}

async function saveData(){
  let now=Date.now();
  await storage.set('ps-items',JSON.stringify(items),true);
  await storage.set('ps-versions',JSON.stringify(versions),true);
  await storage.set('ps-activeVer',activeVerId,true);
  await storage.set('ps-nextVer',nextVerId||'',true);
  await storage.set('ps-open',JSON.stringify(openNodes),true);
  await storage.set('ps-upd',String(now),true);
  lastUpd=String(now);
  updateUpdBadge();
}

function updateUpdBadge(){
  let el=document.getElementById('upd-badge');
  if(!lastUpd){el.textContent='never synced';return;}
  let d=new Date(parseInt(lastUpd));
  el.textContent='updated '+d.toLocaleTimeString();
}

function startSync(){
  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(async()=>{
    try{
      let r=await storage.get('ps-upd');
      if(r&&r.value!==lastUpd){
        await loadData();renderSidebar();if(selectedNode)renderContent(selectedNode);showToast('Roadmap updated');
      }
    }catch(e){}
  },11000);
}

function renderSidebar(){
  let sb=document.getElementById('sidebar');
  sb.innerHTML='';
  sb.appendChild(renderTree(TREE,0));
}

function renderTree(nodes,depth){
  let frag=document.createDocumentFragment();
  for(let n of nodes){
    // Inject a visual section divider in the root tree before content sections
    if(depth===0&&n.id==='content'){
      let divEl=document.createElement('div');
      divEl.style.cssText='margin:10px 8px 2px;border-top:0.5px solid rgba(0,0,0,0.1)';
      let lblEl=document.createElement('div');
      lblEl.textContent='CONTENT';
      lblEl.style.cssText='font-size:10px;font-weight:600;color:#bbb;letter-spacing:.07em;padding:6px 10px 2px;text-transform:uppercase';
      frag.appendChild(divEl);
      frag.appendChild(lblEl);
    }
    let wrap=document.createElement('div');
    let isOpen=openNodes[n.id];
    let cnt=n.special==='versions'?versions.length:countItems(n.id);
    let dneCnt=n.special!=='versions'?countDone(n.id):0;
    let hasChildren=n.children||n.special==='versions';
    let row=document.createElement('div');
    row.className='tree-item'+(selectedNode===n.id?' active':'');
    row.style.paddingLeft=(8+depth*14)+'px';
    let dot=n.role&&ROLE_COLORS[n.role]?`<span class="color-dot" style="background:${ROLE_COLORS[n.role]}"></span>`:'';
    let toggleEl=hasChildren?`<span class="tree-toggle">${isOpen?'▾':'▸'}</span>`:`<span class="tree-toggle"></span>`;
    let countHtml='';
    if(cnt>0)countHtml+=`<span class="tree-count">${cnt}</span>`;
    if(dneCnt>0&&dneCnt!==cnt)countHtml+=`<span class="tree-count done">${dneCnt}✓</span>`;
    let addBtn=n.leaf?`<button class="tree-add" onclick="event.stopPropagation();openAdd('${n.id}')">+ add</button>`:'';
    row.innerHTML=`${toggleEl}${dot}<span class="tree-label">${n.label}</span>${countHtml}${addBtn}`;
    row.addEventListener('click',()=>{
      if(hasChildren){openNodes[n.id]=!isOpen;saveData();renderSidebar();}
      selectNode(n.id);
    });
    wrap.appendChild(row);
    if(hasChildren){
      let childWrap=document.createElement('div');
      childWrap.className='tree-children'+(isOpen?' open':'');
      if(n.special==='versions'){childWrap.appendChild(renderVersionsTree());}
      else if(n.children){childWrap.appendChild(renderTree(n.children,depth+1));}
      wrap.appendChild(childWrap);
    }
    frag.appendChild(wrap);
  }
  return frag;
}

function renderVersionsTree(){
  let frag=document.createDocumentFragment();
  for(let v of versions){
    let row=document.createElement('div');
    row.className='tree-item'+(selectedNode==='ver:'+v.id?' active':'');
    row.style.paddingLeft='36px';
    let isActive=v.id===activeVerId;
    let cnt=items.filter(i=>i.doneInVer===v.id).length;
    row.innerHTML=`<span class="tree-toggle"></span><span class="tree-label">${v.name}</span>${isActive?'<span class="ver-active-badge">active</span>':''}<span class="tree-count done">${cnt}</span>`;
    row.addEventListener('click',()=>selectNode('ver:'+v.id));
    frag.appendChild(row);
  }
  return frag;
}

function selectNode(id){selectedNode=id;renderSidebar();renderContent(id);}

function renderContent(id){
  let content=document.getElementById('content');
  if(id==='nv:feed'){renderNextVerFeed();return;}
  if(id&&id.startsWith('ver:')){renderVersionContent(id.slice(4));return;}
  let node=findNode(TREE,id);
  if(!node){content.innerHTML='<p class="empty">Select a section</p>';return;}
  if(node.special==='versions'){renderVersionsRoot();return;}
  if(!node.leaf){content.innerHTML=`<div class="section-title">${node.label}</div><p style="font-size:13px;color:#888">Select a section below to view items.</p>`;return;}
  let cols=getColumns(node.colType);
  let path=getPathString(id);
  let role=getNodeRole(id);
  let roleColor=role&&ROLE_COLORS[role]?ROLE_COLORS[role]:null;
  let dotHtml=roleColor?`<span class="color-dot" style="background:${roleColor}"></span>`:'';
  let secItems=items.filter(i=>i.section===id);
  let html=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">${dotHtml}<div class="section-title">${node.label}</div></div>
<div class="section-path">${path}</div>
<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="tb-btn" onclick="openAdd('${id}')">+ add item</button></div>
<div class="col-wrap">`;
  for(let col of cols){
    let colItems=secItems.filter(i=>i.col===col);
    html+=`<div class="col"><div class="col-header">${col} <span style="color:#aaa">(${colItems.length})</span></div><div class="col-cards">`;
    if(colItems.length===0)html+=`<div class="empty">No items</div>`;
    for(let item of colItems){
      let priClass=item.priority==='High'?'pri-high':item.priority==='Low'?'pri-low':'pri-med';
      let cols2=getColumns(node.colType);
      let colIdx=cols2.indexOf(col);
      let prevBtn=colIdx>0?`<button class="ca-btn" onclick="moveItem('${item.id}',-1)">← back</button>`:'';
      let nextBtn=colIdx<cols2.length-1?`<button class="ca-btn" onclick="moveItem('${item.id}',1)">→ fwd</button>`:'';
      let doneBtn=col!=='Done'?`<button class="ca-btn done-btn" onclick="markDone('${item.id}')">✓ done</button>`:'';
      html+=`<div class="card">
<div class="card-title">${esc(item.title)}</div>
${item.desc?`<div class="card-desc">${esc(item.desc)}</div>`:''}
<div class="card-meta">
  <span class="badge ${priClass}">${item.priority}</span>
  ${item.roadmap?'<span class="badge badge-roadmap">roadmap</span>':''}
  ${item.assignee?`<span class="badge badge-assignee">${esc(item.assignee)}</span>`:''}
  ${item.date?`<span style="font-size:11px;color:#aaa">${item.date}</span>`:''}
</div>
<div class="card-actions">
  <button class="ca-btn" onclick="openEdit('${item.id}')">edit</button>
  ${prevBtn}${nextBtn}${doneBtn}
  <button class="ca-btn" style="color:#a32d2d" onclick="deleteItem('${item.id}')">delete</button>
</div></div>`;
    }
    html+=`</div></div>`;
  }
  html+=`</div>`;
  content.innerHTML=html;
}

function renderVersionsRoot(){
  let ver=versions.find(v=>v.id===activeVerId);
  let html=`<div class="section-title">Versions</div><div class="section-path">Active: ${ver?ver.name:'none'}</div><div style="margin:1rem 0">`;
  for(let v of versions){
    let isActive=v.id===activeVerId;
    let isNext=v.id===nextVerId;
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.1)">
<span style="font-size:14px;font-weight:500">${esc(v.name)}</span>
${isActive?'<span class="ver-active-badge">active</span>':`<button class="ver-set-btn" onclick="setActiveVer('${v.id}')">set active</button>`}
${isNext?'<span class="ver-next-badge">next</span>':`<button class="ver-set-btn" onclick="setNextVer('${v.id}')">set next</button>`}
<span style="font-size:12px;color:#aaa;margin-left:auto">${items.filter(i=>i.doneInVer===v.id).length} done</span>
<span style="font-size:12px;color:#aaa">${items.filter(i=>i.targetVersion===v.id).length} targeted</span>
<button class="ver-set-btn" onclick="openReleaseNotes('${v.id}')">release notes</button>
</div>`;
  }
  html+=`</div><button class="ver-add-btn" onclick="openVerModal()">+ create new version</button>`;
  document.getElementById('content').innerHTML=html;
}

function renderVersionContent(verId){
  let ver=versions.find(v=>v.id===verId);
  if(!ver){document.getElementById('content').innerHTML='';return;}
  let verItems=items.filter(i=>i.doneInVer===verId);
  let isActive=verId===activeVerId;
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
<div class="section-title">${esc(ver.name)}</div>
${isActive?'<span class="ver-active-badge">active</span>':`<button class="ver-set-btn" onclick="setActiveVer('${verId}')">set active</button>`}
<button class="ver-set-btn" onclick="openReleaseNotes('${verId}')">release notes</button>
</div><div class="section-path">${verItems.length} completed items</div>`;
  if(verItems.length===0){html+=`<p class="empty">No items completed in this version yet.</p>`;}
  else{
    // Group by top-level section (Product / Back office / Notifications), then by role/subsection
    const TOP=['product','backoffice','notifications','content','content-strategy','backend'];
    const TOP_LABELS={'product':'Product','backoffice':'Back office','notifications':'Notifications','content':'Informative Content','content-strategy':'Content Strategy','backend':'Backend / Infrastructure'};
    function getTopLevel(sectionId){
      function search(nodes,id,top){
        for(let n of nodes){
          let t=top||n.id;
          if(n.id===id)return t;
          if(n.children){let f=search(n.children,id,t);if(f)return f;}
        }
        return null;
      }
      return search(TREE,sectionId,null);
    }
    function getRoleLabel(sectionId){
      function search(nodes,id,role){
        for(let n of nodes){
          let r=n.role||role;
          if(n.id===id)return r||'General';
          if(n.children){let f=search(n.children,id,r);if(f)return f;}
        }
        return null;
      }
      return search(TREE,sectionId,null)||'General';
    }
    // Build structure: {product:{Creator:[items],Basic/Buyer:[items]}, backoffice:{General:[items]}, ...}
    let structure={};
    for(let top of TOP){structure[top]={};}
    for(let item of verItems){
      let top=getTopLevel(item.section)||'product';
      let role=getRoleLabel(item.section);
      if(!structure[top])structure[top]={};
      if(!structure[top][role])structure[top][role]=[];
      structure[top][role].push(item);
    }
    for(let top of TOP){
      let roles=structure[top];
      if(!roles||Object.keys(roles).length===0)continue;
      html+=`<div style="margin-bottom:2rem">
<div style="font-size:16px;font-weight:500;margin-bottom:1rem;padding-bottom:6px;border-bottom:0.5px solid rgba(0,0,0,0.15)">${TOP_LABELS[top]}</div>`;
      for(let [role,ritems] of Object.entries(roles)){
        let roleColor=ROLE_COLORS[role]||null;
        let dot=roleColor?`<span class="color-dot" style="background:${roleColor}"></span>`:'';
        html+=`<div class="ver-group">
<div class="ver-group-title" style="display:flex;align-items:center;gap:6px">${dot}${role}</div>`;
        for(let item of ritems){
          let path=getPathString(item.section);
          html+=`<div class="card">
<div style="font-size:10px;color:#aaa;margin-bottom:4px">${path}</div>
<div class="card-title">${esc(item.title)}</div>
${item.desc?`<div class="card-desc">${esc(item.desc)}</div>`:''}
<div class="card-meta"><span class="badge ${item.priority==='High'?'pri-high':item.priority==='Low'?'pri-low':'pri-med'}">${item.priority}</span>${item.assignee?`<span class="badge badge-assignee">${esc(item.assignee)}</span>`:''}</div>
</div>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    }
  }
  document.getElementById('content').innerHTML=html;
}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openAdd(sectionId){
  editingId=null;
  document.getElementById('modal-title').textContent='Add item';
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-assignee').value='';
  document.getElementById('f-date').value='';
  document.getElementById('f-roadmap').checked=false;
  document.getElementById('f-pri').value='Medium';
  populateSectionSelect(sectionId);
  populateTargetVerSelect(null);
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(itemId){
  let item=items.find(i=>i.id===itemId);
  if(!item)return;
  editingId=itemId;
  document.getElementById('modal-title').textContent='Edit item';
  document.getElementById('f-title').value=item.title||'';
  document.getElementById('f-desc').value=item.desc||'';
  document.getElementById('f-assignee').value=item.assignee||'';
  document.getElementById('f-date').value=item.date||'';
  document.getElementById('f-roadmap').checked=!!item.roadmap;
  document.getElementById('f-pri').value=item.priority||'Medium';
  populateSectionSelect(item.section);
  populateTargetVerSelect(item.targetVersion||null);
  let colSel=document.getElementById('f-col');
  for(let opt of colSel.options){if(opt.value===item.col){opt.selected=true;break;}}
  document.getElementById('modal-overlay').classList.add('open');
}

function populateSectionSelect(selectedId){
  let sel=document.getElementById('f-section');
  sel.innerHTML='';
  for(let leaf of ALL_LEAVES){
    let opt=document.createElement('option');
    opt.value=leaf.id;opt.textContent=leaf.path.join(' › ');
    if(leaf.id===selectedId)opt.selected=true;
    sel.appendChild(opt);
  }
  updateColSelect();
  sel.addEventListener('change',updateColSelect);
}

function updateColSelect(){
  let secId=document.getElementById('f-section').value;
  let leaf=ALL_LEAVES.find(l=>l.id===secId);
  let cols=leaf?getColumns(leaf.colType):COL_TYPES.standard;
  let sel=document.getElementById('f-col');
  let prev=sel.value;
  sel.innerHTML='';
  for(let c of cols){
    let opt=document.createElement('option');
    opt.value=c;opt.textContent=c;
    if(c===prev)opt.selected=true;
    sel.appendChild(opt);
  }
}

function saveItem(){
  let title=document.getElementById('f-title').value.trim();
  if(!title){showToast('Title required');return;}
  let section=document.getElementById('f-section').value;
  let col=document.getElementById('f-col').value;
  let priority=document.getElementById('f-pri').value;
  let assignee=document.getElementById('f-assignee').value.trim();
  let date=document.getElementById('f-date').value;
  let roadmap=document.getElementById('f-roadmap').checked;
  let desc=document.getElementById('f-desc').value.trim();
  let targetVersion=document.getElementById('f-targetver').value||null;
  if(editingId){
    let item=items.find(i=>i.id===editingId);
    if(item){
      let wasDone=item.col==='Done';
      Object.assign(item,{title,section,col,priority,assignee,date,roadmap,desc,targetVersion});
      if(col==='Done'&&!wasDone){item.doneInVer=activeVerId;}
      if(col!=='Done'){delete item.doneInVer;}
    }
  } else {
    let item={id:'i'+Date.now(),title,desc,section,col,priority,assignee,date,roadmap,targetVersion,created:Date.now()};
    if(col==='Done'){item.doneInVer=activeVerId;}
    items.push(item);
  }
  saveData();closeModal();renderSidebar();renderContent(selectedNode);
  showToast(editingId?'Item updated':'Item added');
}

function markDone(itemId){
  let item=items.find(i=>i.id===itemId);if(!item)return;
  item.col='Done';item.doneInVer=activeVerId;
  let ver=versions.find(v=>v.id===activeVerId);
  saveData();renderSidebar();renderContent(selectedNode);
  showToast('Moved to Done — added to '+(ver?ver.name:'active version'));
}

function moveItem(itemId,dir){
  let item=items.find(i=>i.id===itemId);if(!item)return;
  let leaf=ALL_LEAVES.find(l=>l.id===item.section);if(!leaf)return;
  let cols=getColumns(leaf.colType);
  let idx=cols.indexOf(item.col);
  let newIdx=idx+dir;
  if(newIdx<0||newIdx>=cols.length)return;
  item.col=cols[newIdx];
  if(item.col==='Done'){item.doneInVer=activeVerId;}else{delete item.doneInVer;}
  saveData();renderSidebar();renderContent(selectedNode);
}

function deleteItem(itemId){
  if(!confirm('Delete this item?'))return;
  items=items.filter(i=>i.id!==itemId);
  saveData();renderSidebar();renderContent(selectedNode);showToast('Item deleted');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function openVerModal(){document.getElementById('ver-name-inp').value='';document.getElementById('ver-modal-overlay').classList.add('open');}
function closeVerModal(){document.getElementById('ver-modal-overlay').classList.remove('open');}

function saveVersion(){
  let name=document.getElementById('ver-name-inp').value.trim();
  if(!name){showToast('Name required');return;}
  let id='v'+Date.now();
  versions.push({id,name,created:Date.now()});
  activeVerId=id;
  saveData();closeVerModal();renderSidebar();renderContent(selectedNode);
  showToast('Version "'+name+'" created and set active');
}

function setActiveVer(id){
  activeVerId=id;saveData();renderSidebar();renderContent(selectedNode);
  let v=versions.find(x=>x.id===id);showToast((v?v.name:'Version')+' is now active');
}

function openReleaseNotes(verId){
  let ver=versions.find(v=>v.id===verId);
  if(!ver)return;
  let verItems=items.filter(i=>i.doneInVer===verId);
  // Only include Product, Back office, Notifications, and Backend — not content sections
  const RN_TOP=['product','backoffice','notifications','backend'];
  function getTopLevel(sectionId){
    function search(nodes,id,top){
      for(let n of nodes){let t=top||n.id;if(n.id===id)return t;if(n.children){let f=search(n.children,id,t);if(f)return f;}}
      return null;
    }
    return search(TREE,sectionId,null);
  }
  function getRoleLabel(sectionId){
    function search(nodes,id,role){
      for(let n of nodes){let r=n.role||role;if(n.id===id)return r||'General';if(n.children){let f=search(n.children,id,r);if(f)return f;}}
      return null;
    }
    return search(TREE,sectionId,null)||'General';
  }
  // Group: {product:{Creator:[titles],...}, backoffice:{General:[...]}, ...}
  let structure={};
  for(let item of verItems){
    let top=getTopLevel(item.section);
    if(!top||!RN_TOP.includes(top))continue;
    let role=getRoleLabel(item.section);
    if(!structure[top])structure[top]={};
    if(!structure[top][role])structure[top][role]=[];
    structure[top][role].push(item.title);
  }
  // Role → friendly header label
  const ROLE_HEADERS={
    'Creator':'NEW FOR CREATORS',
    'Basic / Buyer':'NEW FOR BUYERS',
    'Agency':'NEW FOR AGENCIES',
    'Manager':'NEW FOR MANAGERS',
    'Cross-seller':'NEW FOR CROSS-SELLERS',
    'Legal & Financial':'NEW FOR LEGAL & FINANCIAL',
    'Business':'NEW FOR BUSINESSES',
    'Nonprofit':'NEW FOR NONPROFITS',
    'General':'GENERAL',
  };
  const TOP_HEADERS={
    'product':null, // roles already give headers
    'backoffice':'BACK OFFICE / ADMIN',
    'notifications':'NOTIFICATIONS',
    'backend':'BACKEND / INFRASTRUCTURE',
  };
  let today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  let lines=[`PassionStocks ${ver.name} — Release Notes`,today,''];
  for(let top of RN_TOP){
    if(!structure[top]||Object.keys(structure[top]).length===0)continue;
    if(TOP_HEADERS[top]){
      // non-product sections: single header
      lines.push(TOP_HEADERS[top]+':');
      for(let [role,titles] of Object.entries(structure[top])){
        for(let t of titles)lines.push('- '+t);
      }
      lines.push('');
    } else {
      // product: group by role with role-specific header
      for(let [role,titles] of Object.entries(structure[top])){
        let header=ROLE_HEADERS[role]||('NEW FOR '+role.toUpperCase());
        lines.push(header+':');
        for(let t of titles)lines.push('- '+t);
        lines.push('');
      }
    }
  }
  let text=lines.join('\n').trim();
  document.getElementById('rn-modal-title').textContent=ver.name+' — Release Notes';
  document.getElementById('rn-output').value=text;
  document.getElementById('rn-modal-overlay').classList.add('open');
}

function closeRnModal(){document.getElementById('rn-modal-overlay').classList.remove('open');}

function populateTargetVerSelect(selectedId){
  let sel=document.getElementById('f-targetver');
  sel.innerHTML='<option value="">None</option>';
  for(let v of versions){
    let opt=document.createElement('option');
    opt.value=v.id;opt.textContent=v.name;
    if(v.id===selectedId)opt.selected=true;
    sel.appendChild(opt);
  }
}

function updateNextVerBadge(){
  let btn=document.getElementById('next-ver-btn');
  if(!btn)return;
  if(nextVerId){
    let v=versions.find(x=>x.id===nextVerId);
    if(v){btn.textContent='Next: '+v.name;btn.style.display='';}
    else{nextVerId=null;btn.style.display='none';}
  } else {
    btn.style.display='none';
  }
}

function setNextVer(id){
  nextVerId=id;saveData();updateNextVerBadge();
  let v=versions.find(x=>x.id===id);showToast((v?v.name:'Version')+' set as next version');
  renderContent(selectedNode);
}

function openNextVerFeed(){
  if(!nextVerId){showToast('No next version set. Go to Versions to set one.');return;}
  nvGroupOpen={};
  nvSearchQuery='';
  selectedNode='nv:feed';
  renderSidebar();
  renderNextVerFeed();
}

function renderNextVerFeed(){
  let content=document.getElementById('content');
  if(!nextVerId){content.innerHTML='<p class="empty">No next version set.</p>';return;}
  let ver=versions.find(v=>v.id===nextVerId);
  if(!ver){content.innerHTML='<p class="empty">Next version not found.</p>';return;}
  let targetItems=items.filter(i=>i.targetVersion===nextVerId);
  let doneCount=targetItems.filter(i=>i.col==='Done').length;
  let total=targetItems.length;
  let pct=total>0?Math.round(doneCount/total*100):0;
  const FEED_TOP=['product','backoffice','notifications','backend','content-strategy','content'];
  const FEED_LABELS={
    'product':'Product',
    'backoffice':'Back office',
    'notifications':'Notifications',
    'backend':'Backend / Infrastructure',
    'content-strategy':'Content Strategy',
    'content':'Informative Content'
  };
  function getTopLevel(sectionId){
    function search(nodes,id,top){for(let n of nodes){let t=top||n.id;if(n.id===id)return t;if(n.children){let f=search(n.children,id,t);if(f)return f;}}return null;}
    return search(TREE,sectionId,null);
  }
  function getRoleLabel(sectionId){
    function search(nodes,id,role){for(let n of nodes){let r=n.role||role;if(n.id===id)return r||'General';if(n.children){let f=search(n.children,id,r);if(f)return f;}}return null;}
    return search(TREE,sectionId,null)||'General';
  }
  // Apply search filter
  let q=nvSearchQuery.toLowerCase();
  let displayItems=q
    ? targetItems.filter(i=>i.title.toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q))
    : targetItems;
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
  <div class="section-title">${esc(ver.name)}</div>
</div>
<div class="section-path">${total} targeted item${total===1?'':'s'} · ${doneCount} done</div>
<input class="search-box" style="width:100%;box-sizing:border-box;margin:10px 0 8px" placeholder="Search items in ${esc(ver.name)}..." value="${esc(nvSearchQuery)}" oninput="nvDoSearch(this.value)" />
<div style="margin:0 0 4px;display:flex;align-items:center;gap:10px">
  <div class="progress-bar-wrap" style="margin:0;flex:1"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  <span style="font-size:12px;color:#888;white-space:nowrap;min-width:32px;text-align:right">${pct}%</span>
</div>
<div style="display:flex;gap:8px;margin:10px 0 1.5rem">
  <button class="tb-btn" onclick="nvExpandAll()">expand all</button>
  <button class="tb-btn" onclick="nvCollapseAll()">collapse all</button>
</div>`;
  if(total===0){
    html+=`<p class="empty">No items have this version set as their target yet.<br>Open any item and set its Target Version to "${esc(ver.name)}" to track it here.</p>`;
  } else if(displayItems.length===0){
    html+=`<p class="empty">No items match your search.</p>`;
  } else {
    // Build structure from the filtered display set
    let filteredStructure={};
    for(let top of FEED_TOP)filteredStructure[top]={};
    for(let item of displayItems){
      let top=getTopLevel(item.section);
      if(!top||!FEED_TOP.includes(top))top='product';
      let role=getRoleLabel(item.section);
      if(!filteredStructure[top][role])filteredStructure[top][role]=[];
      filteredStructure[top][role].push(item);
    }
    for(let top of FEED_TOP){
      let roles=filteredStructure[top];
      if(!roles||Object.keys(roles).length===0)continue;
      let totalInSection=Object.values(roles).reduce((s,a)=>s+a.length,0);
      if(totalInSection===0)continue;
      if(top==='product'){
        html+=`<div class="nv-top-lbl">${FEED_LABELS[top]}</div>`;
        for(let [role,ritems] of Object.entries(roles)){
          if(!ritems.length)continue;
          let gid='product__'+role;
          let safeId=gid.replace(/[^a-zA-Z0-9_-]/g,'_');
          let isOpen=q?true:!!nvGroupOpen[gid];
          let roleColor=ROLE_COLORS[role]||null;
          let dot=roleColor?`<span class="color-dot" style="background:${roleColor}"></span>`:'';
          html+=`<div class="nv-group-hdr" onclick="nvToggleGroup('${gid}')">
  <span style="font-size:10px;color:#aaa;margin-right:2px">${isOpen?'▾':'▸'}</span>
  ${dot}<span style="font-size:13px;font-weight:500">${role}</span>
  <span style="font-size:11px;color:#aaa;margin-left:auto">${ritems.length}</span>
</div>
<div id="nvg-${safeId}" style="display:${isOpen?'block':'none'};padding-left:8px">`;
          for(let item of ritems)html+=renderFeedItem(item);
          html+=`</div>`;
        }
      } else {
        let gid=top;
        let isOpen=q?true:!!nvGroupOpen[gid];
        html+=`<div class="nv-group-hdr" onclick="nvToggleGroup('${gid}')">
  <span style="font-size:10px;color:#aaa;margin-right:2px">${isOpen?'▾':'▸'}</span>
  <span style="font-size:13px;font-weight:500">${FEED_LABELS[top]}</span>
  <span style="font-size:11px;color:#aaa;margin-left:auto">${totalInSection}</span>
</div>
<div id="nvg-${gid}" style="display:${isOpen?'block':'none'};padding-left:8px">`;
        let roleKeys=Object.keys(roles);
        for(let role of roleKeys){
          let ritems=roles[role];
          if(!ritems.length)continue;
          if(roleKeys.length>1||role!=='General'){
            html+=`<div style="font-size:11px;color:#aaa;padding:6px 0 2px;font-weight:500">${role}</div>`;
          }
          for(let item of ritems)html+=renderFeedItem(item);
        }
        html+=`</div>`;
      }
    }
  }
  content.innerHTML=html;
}

function renderFeedItem(item){
  let isDone=item.col==='Done';
  let path=getPathString(item.section);
  return `<div class="feed-item" onclick="openEdit('${item.id}')">
<div class="feed-check ${isDone?'done':''}">${isDone?'✓':''}</div>
<div style="flex:1;min-width:0;overflow:hidden">
  <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.title)}</div>
  ${path?`<div style="font-size:11px;color:#aaa;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${path}</div>`:''}
</div>
<span class="badge ${isDone?'pri-low':'badge-assignee'}" style="flex-shrink:0;align-self:center;margin-left:8px">${isDone?'Done':'Not Done'}</span>
</div>`;
}

function nvToggleGroup(gid){
  nvGroupOpen[gid]=!nvGroupOpen[gid];
  renderNextVerFeed();
}

function nvExpandAll(){
  if(!nextVerId)return;
  const FEED_TOP=['product','backoffice','notifications','backend','content-strategy','content'];
  function getTopLevel(sectionId){
    function search(nodes,id,top){for(let n of nodes){let t=top||n.id;if(n.id===id)return t;if(n.children){let f=search(n.children,id,t);if(f)return f;}}return null;}
    return search(TREE,sectionId,null);
  }
  function getRoleLabel(sectionId){
    function search(nodes,id,role){for(let n of nodes){let r=n.role||role;if(n.id===id)return r||'General';if(n.children){let f=search(n.children,id,r);if(f)return f;}}return null;}
    return search(TREE,sectionId,null)||'General';
  }
  for(let item of items.filter(i=>i.targetVersion===nextVerId)){
    let top=getTopLevel(item.section)||'product';
    if(!FEED_TOP.includes(top))top='product';
    nvGroupOpen[top==='product'?('product__'+getRoleLabel(item.section)):top]=true;
  }
  renderNextVerFeed();
}

function nvCollapseAll(){nvGroupOpen={};renderNextVerFeed();}

function closeNextVerFeed(){
  if(selectedNode==='nv:feed'){
    selectedNode=null;
    document.getElementById('content').innerHTML='<p class="empty">Select a section</p>';
  }
}

function copyReleaseNotes(){
  let ta=document.getElementById('rn-output');
  ta.select();
  try{navigator.clipboard.writeText(ta.value).then(()=>showToast('Copied to clipboard'));}
  catch(e){document.execCommand('copy');showToast('Copied to clipboard');}
}

function expandAll(){
  function setOpen(nodes){for(let n of nodes){openNodes[n.id]=true;if(n.children)setOpen(n.children);}}
  setOpen(TREE);saveData();renderSidebar();
}
function collapseAll(){openNodes={};saveData();renderSidebar();}

function doSearch(q){
  if(!q){renderSidebar();return;}
  q=q.toLowerCase();
  let matched=items.filter(i=>i.title.toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q)||(i.assignee||'').toLowerCase().includes(q));
  let sectionIds=new Set(matched.map(i=>i.section));
  function openParents(nodes,target){
    for(let n of nodes){if(n.id===target)return true;if(n.children){if(openParents(n.children,target)){openNodes[n.id]=true;return true;}}}
    return false;
  }
  for(let sid of sectionIds){openParents(TREE,sid);}
  renderSidebar();
  if(sectionIds.size>0){let first=[...sectionIds][0];selectNode(first);}
}

function showToast(msg){
  let t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeVerModal();closeRnModal();closeNextVerFeed();}});
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.getElementById('ver-modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('ver-modal-overlay'))closeVerModal();});
document.getElementById('rn-modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('rn-modal-overlay'))closeRnModal();});
document.getElementById('f-section').addEventListener('change',updateColSelect);
</script>
</body>
</html>
